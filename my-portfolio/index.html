<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>松下歩美 - ポートフォリオ</title>

    <link rel="stylesheet" href="assets/css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="header">
        <div class="container">
            <div class="logo">Ayumi M.</div>
            <nav>
                <ul class="nav-list">
                    <li><a href="#about">About</a></li>
                    <li><a href="#skills">Skills</a></li>
                    <li><a href="#works">Works</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>

        <section class="hero">
            <div class="hero-content">
                <h1>Portfolio</h1>
                <p>Web Design </p>
            </div>
        </section>

        <section id="about" class="fade-in">
            <div class="container">
                <h2>About</h2>
                <img src="assets/images/profile.jpg" alt="プロフィール画像" class="profile-img">
                <p>
                    はじめまして。松下歩美です。
                    Webデザインについて学習しています。
                </p>
            </div>
        </section>

        <section id="skills" class="fade-in">
            <div class="container">
                <h2>Skills</h2>
                <div class="skills-grid">
                    <div class="card">HTML</div>
                    <div class="card">CSS</div>
                    <div class="card">JavaScript</div>
                    <div class="card">Figma</div>
                </div>
            </div>
        </section>

        <section id="works" class="fade-in">
            <div class="container">
                <h2>Works</h2>
                <div class="works-grid">
                    <div class="card">自己紹介サイト</div>
                    <div class="card">ReEstaロゴ制作</div>
                    <div class="card">ポートフォリオサイト</div>
                </div>
            </div>
        </section>

    </main>

    <footer>
        <p>&copy; 2026 Ayumi Matsushita. All rights reserved.</p>
    </footer>

    <button id="topBtn" aria-label="トップに戻る">↑</button>

    <script src="assets/js/script.js"></script>
</body>
</html>
